<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css/styles.css">
    <title>Lab 5</title>
</head>
<body>
    <header>
        <div class="header-container">
            <img src="images/Sorcerer_Class_Icon.png" alt="Sorcerer Icon">
            <h1 class="header-title"><strong>Sorcerer Club</strong></h1>
        </div>
        <nav class="nav-container">
            <a class="website-links home-link-contact" href="index.html">Home</a>
            <a class="website-links contact-link-contact" href="contact.html">Contact Us!</a>
        </nav>
    </header>
    <form>
        <div class="input-container">
            <label class="input-text" for="fname">Your Name:</label><br>
            <input class="input-item" type="text" name="fname" id="fname"><br>
        </div>
        <div class="input-container">
            <label class="input-text" for="email">Your Email:</label><br>
            <input class="input-item" type="text" name="email" id="email"><br>
        </div>
        <div class="input-container">
            <label class="input-text" for="message">Your Message:</label><br>
            <input class="input-item" type="text" name="message" id="message"><br>
        </div>
        <div class="input-container">
            <input class="button-input" type="button" onclick="alert('Message Sent!')"" value="Submit">
        </div>
    </form>
    <footer class="footer-container">
        <p class="footer-items">Created by Ben Gataric</p>
        <p class="footer-items">Follow us on <a href="#">social media!</a></p>
    </footer>   
</body>
</html>
